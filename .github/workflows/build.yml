name: Build Windows Sticker Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore StickerApp/StickerApp.csproj

    - name: Build Application
      run: dotnet build StickerApp/StickerApp.csproj --configuration Release --no-restore
