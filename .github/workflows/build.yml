name: Build Windows Sticker Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore StickerApp/StickerApp.csproj

    - name: Build Framework Dependent (Small size)
      run: dotnet build StickerApp/StickerApp.csproj --configuration Release -p:SelfContained=false -p:WindowsAppSDKSelfContained=false -o build-output/framework-dependent

    - name: Build Self-Contained (Large size)
      run: dotnet build StickerApp/StickerApp.csproj --configuration Release -p:SelfContained=true -p:WindowsAppSDKSelfContained=true -o build-output/self-contained

    - name: Upload Framework Dependent Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StickerApp-Framework-Dependent
        path: build-output/framework-dependent/
        if-no-files-found: error

    - name: Upload Self-Contained Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StickerApp-Self-Contained
        path: build-output/self-contained/
        if-no-files-found: error
